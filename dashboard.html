<!DOCTYPE html>
<html>
<head>
  <title>Cloud Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_HERE",
      authDomain: "PASTE_HERE",
      projectId: "PASTE_HERE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allData = [];

    const monthNames = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    function formatMonth(dateStr) {
      let d = new Date(dateStr);
      return monthNames[d.getMonth()] + " " + d.getFullYear();
    }

    function getMonthKey(dateStr) {
      let d = new Date(dateStr);
      return d.getFullYear() + "-" + d.getMonth();
    }

    async function addTransaction() {
      let amount = Number(document.getElementById("amount").value);
      let returned = Number(document.getElementById("returned").value);
      let tracking = document.getElementById("tracking").value;

      await addDoc(collection(db, "transactions"), {
        amount,
        returned,
        profit: returned - amount,
        tracking,
        date: new Date().toISOString()
      });

      loadData();
    }

    async function loadData() {
      let snapshot = await getDocs(collection(db, "transactions"));
      allData = [];

      snapshot.forEach(doc => {
        allData.push(doc.data());
      });

      populateMonths();
      render();
    }

    function populateMonths() {
      let select = document.getElementById("monthSelect");

      let uniqueMonths = {};

      // Collect months from data
      allData.forEach(t => {
        let key = getMonthKey(t.date);
        uniqueMonths[key] = formatMonth(t.date);
      });

      // Always include current month
      let now = new Date();
      let currentKey = now.getFullYear() + "-" + now.getMonth();
      uniqueMonths[currentKey] = monthNames[now.getMonth()] + " " + now.getFullYear();

      select.innerHTML = "";

      Object.keys(uniqueMonths).sort().forEach(key => {
        let option = document.createElement("option");
        option.value = key;
        option.text = uniqueMonths[key];
        select.appendChild(option);
      });

      select.value = currentKey;
    }

    function render() {
      let selectedKey = document.getElementById("monthSelect").value;

      let total = 0;
      let html = "";

      allData.forEach(t => {
        if (getMonthKey(t.date) === selectedKey) {
          total += t.profit;
          html += `<p>$${t.profit} | ${t.tracking}</p>`;
        }
      });

      document.getElementById("output").innerHTML =
        `<b>Total Profit:</b> $${total.toFixed(2)}<br><br>` + html;
    }

    window.addTransaction = addTransaction;
    window.onload = loadData;
  </script>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
<h1>☁️ Credit Tracker</h1>
<div class="card">
  <input id="amount" placeholder="Amount Spent">
  <input id="returned" placeholder="Returned">
  <input id="tracking" placeholder="Tracking #">
  <button onclick="addTransaction()">Add</button>
</div>
<div class="card">
  <h3>Select Month</h3>
  <select id="monthSelect" onchange="render()"></select>
</div>
<div class="card">
  <div id="output"></div>
</div>
</body>
</html>
:::
