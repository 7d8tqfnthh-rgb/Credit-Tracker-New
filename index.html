<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    input {
      width: 80%;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 85%;
      padding: 15px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
    }

    h1 {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

<h1>💳 Credit Tracker</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<script>
function login() {
  let username = document.getElementById("user").value.trim();
  let password = document.getElementById("pass").value.trim();

  if (username === "lifesmasher" && password === "7564") {
    window.location.href = "dashboard.html";
  } else {
    alert("Wrong login");
  }
}
</script>

</body>
</html>
